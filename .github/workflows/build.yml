name: 自动打包 Windows

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: xhsbj
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置 Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: 安装依赖
        run: pip install PyQt6 Pillow numpy av pyinstaller

      - name: 确保 templates 目录存在
        run: New-Item -ItemType Directory -Force -Path templates
        shell: pwsh

      - name: PyInstaller 打包
        run: |
          pyinstaller `
            --windowed `
            --name "融景" `
            --add-data "templates;templates" `
            --hidden-import "PIL._tkinter_finder" `
            --hidden-import "av" `
            --collect-all "av" `
            --noconfirm `
            main.py
        shell: pwsh

      - name: 压缩为 ZIP
        run: Compress-Archive -Path "dist\融景" -DestinationPath "dist\融景_windows_x64.zip"
        shell: pwsh

      - name: 上传 Windows 安装包
        uses: actions/upload-artifact@v4
        with:
          name: 融景_windows_x64
          path: xhsbj/dist/融景_windows_x64.zip
